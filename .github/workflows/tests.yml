name: testing

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: install bun
        uses: oven-sh/setup-bun@v2

      - name: install deps
        run: bun install

      - name: run tests
        run: bun test
