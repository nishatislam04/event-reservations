name: code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: setup biome
        uses: biomejs/setup-biome@v2
        with:
          version: "2.4.9"

      - name: run biome
        run: biome ci .
