name: code quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: install biome
        uses: biomejs/setup-biome@v2

      - name: run biome
        run: biome ci .
